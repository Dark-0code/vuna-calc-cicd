name: Docker Hub Push and Server Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    name: Build Docker Image, Push to Hub, Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code into the runner environment
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up the Docker Build engine inside the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log into your personal Docker Hub account using repository secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build your Dockerfile and push it live to Docker Hub
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

      # Step 5: Securely connect to the restricted VPS over SSH port 22
      - name: Execute Remote SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Clean up all existing folders and files inside public_html safely
            find public_html/ -mindepth 1 -delete
            
            # Force pull your repository directly into your webroot folder
            git clone https://github.com/Dark-0code/vuna-calc-cicd public_html/