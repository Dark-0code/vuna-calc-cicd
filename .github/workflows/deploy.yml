name: Deploy Gideon Calculator App

on:
  push:
    branches:
      - main

jobs:
  deploy-static-files:
    name: Pull Code Directly to Server Webroot
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /home/gideon.vudse26.cloud/public_html
            # Clean up old initialization files if any exist
            rm -rf *
            # Force pull the absolute latest source directly onto the web path
            git clone https://github.com/${{ github.repository }} .