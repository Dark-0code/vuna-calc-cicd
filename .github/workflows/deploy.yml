name: Deploy Gideon Calculator App

on:
  push:
    branches:
      - main

jobs:
  deploy-static-files:
    name: Pull Code Directly to Server Webroot
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Navigate inside public_html and target custom sub-items directly
            # This safely clears files and sub-folders without triggering restricted shell locks
            find public_html/ -mindepth 1 -delete
            
            # Now that it's completely empty, clone your repo directly into it
            git clone https://github.com/Dark-0code/vuna-calc-cicd public_html/