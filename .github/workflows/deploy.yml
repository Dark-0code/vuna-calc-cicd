name: Deploy Gideon Calculator App

on:
  push:
    branches:
      - main

jobs:
  deploy-static-files:
    name: Sync Source Files to cPanel Folder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 21 
          local-dir: ./
          # Setting to dot-slash ensures it drops right into your authenticated root directory
          server-dir: ./