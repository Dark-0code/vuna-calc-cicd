name: Deploy Gideon Calculator with Docker Structure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Artifacts and Sync to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # This step simulates a local Docker build to verify your Dockerfile works perfectly
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # We only build it locally to verify it compiles with no errors

      # Once Docker passes, we push your static structure directly to your server folder
      - name: Execute Remote SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            find public_html/ -mindepth 1 -delete
            git clone https://github.com/Dark-0code/vuna-calc-cicd public_html/