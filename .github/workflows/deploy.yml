name: Deploy Gideon Calculator App

on:
  push:
    branches:
      - main

jobs:
  deploy-static-files:
    name: Pull Code Directly to Server Webroot
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Clean only your calculator files inside public_html, leaving system directories alone
            rm -f public_html/*
            
            # Git clone directly into the public_html folder using your exact repository URL
            git clone https://github.com/Dark-0code/vuna-calc-cicd public_html/