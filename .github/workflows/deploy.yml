name: Docker Hub Push and Server Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    name: Build Docker Image, Push to Hub, Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Set up the Docker Build engine inside the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into your personal Docker Hub account using your saved secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Dockerfile and push it live to your Docker Hub repository
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # This names the image after your username and tags it as the absolute latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

      # Finalize by deploying the structure over your restricted VPS shell
      - name: Execute Remote SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            find public_html/ -mindepth 1 -delete
            git clone https://github.com/Dark-0code/vuna-calc-cicd public_html/
            
            # Navigate into the server directory and install the packages
            cd public_html
            npm install