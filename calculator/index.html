<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator-container {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            margin-bottom: 20px;
        }
        #display {
            width: 100%;
            height: 60px;
            background: #f4f4f6;
            border: none;
            border-radius: 10px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            color: #333;
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            height: 55px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:active {
            transform: scale(0.95);
        }
        .num-btn { background: #e4e6eb; color: #333; }
        .num-btn:hover { background: #d8dadf; }
        .op-btn { background: #4a54f1; color: #fff; }
        .op-btn:hover { background: #373fd3; }
        .clear-btn { background: #f53b57; color: #fff; }
        .clear-btn:hover { background: #dd223f; }
        
        /* Temperature Converter Styles */
        .temp-container {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            box-sizing: border-box;
        }
        .temp-title {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 18px;
            text-align: center;
        }
        .temp-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e4e6eb;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .temp-input:focus { border-color: #4a54f1; }
        .select-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        select {
            padding: 10px;
            border: 2px solid #e4e6eb;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            outline: none;
            width: 42%;
        }
        select:focus { border-color: #4a54f1; }
        .convert-btn {
            width: 100%;
            background: #4a54f1;
            color: white;
            font-size: 16px;
            height: 48px;
        }
        .convert-btn:hover { background: #373fd3; }
        #tempResult {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #4a54f1;
            text-align: center;
        }
        .back-link {
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-weight: 500;
        }
        .back-link:hover { color: #4a54f1; }
    </style>
</head>
<body>

    <div class="calculator-container">
        <input type="text" id="display" readonly value="0">
        <div class="buttons-grid">
            <button class="clear-btn" onclick="clearDisplay()">C</button>
            <button class="num-btn" onclick="appendValue('/')">/</button>
            <button class="num-btn" onclick="appendValue('*')">*</button>
            <button class="num-btn" onclick="appendValue('-')">-</button>
            
            <button class="num-btn" onclick="appendValue('7')">7</button>
            <button class="num-btn" onclick="appendValue('8')">8</button>
            <button class="num-btn" onclick="appendValue('9')">9</button>
            <button class="op-btn" onclick="appendValue('+')">+</button>
            
            <button class="num-btn" onclick="appendValue('4')">4</button>
            <button class="num-btn" onclick="appendValue('5')">5</button>
            <button class="num-btn" onclick="appendValue('6')">6</button>
            <button class="op-btn" onclick="calculateResult()">=</button>
            
            <button class="num-btn" onclick="appendValue('1')">1</button>
            <button class="num-btn" onclick="appendValue('2')">2</button>
            <button class="num-btn" onclick="appendValue('3')">3</button>
            <button class="num-btn" onclick="appendValue('0')">0</button>
        </div>
    </div>

    <div class="temp-container">
        <h3 class="temp-title">Temperature Converter</h3>
        <input type="number" id="tempInput" class="temp-input" placeholder="Enter temperature value">
        
        <div class="select-group">
            <select id="tempFrom">
                <option value="C">Celsius (°C)</option>
                <option value="F">Fahrenheit (°F)</option>
            </select>
            <span style="font-weight: bold; color: #666;">to</span>
            <select id="tempTo">
                <option value="F">Fahrenheit (°F)</option>
                <option value="C">Celsius (°C)</option>
            </select>
        </div>

        <button id="convertTempBtn" class="convert-btn">Convert Metrics</button>
        <div id="tempResult">Result: --</div>
    </div>

    <a href="../index.html" class="back-link">← Back to Homepage</a>

    <script src="script.js"></script>
</body>
</html>
